<!doctype html>
<meta charset="utf-8" />
<title>flowgraph</title>
<!-- ponytail: Cytoscape pulled from CDN. Fine for a local dev dashboard; an
     airgapped host would need it vendored. -->
<script src="https://unpkg.com/cytoscape@3.30.2/dist/cytoscape.min.js"></script>
<style>
  :root { font-family: ui-sans-serif, system-ui, sans-serif; }
  * { box-sizing: border-box; }
  body { margin: 0; display: flex; height: 100vh; }
  #cy { flex: 1; height: 100%; background: #fafafa; }
  #side { width: 320px; padding: 14px; border-left: 1px solid #e5e7eb; overflow: auto; font-size: 13px; }
  h1 { font-size: 15px; margin: 0 0 10px; }
  .row { margin-bottom: 10px; }
  label { display: block; font-weight: 600; margin-bottom: 3px; font-size: 12px; color: #374151; }
  select { width: 100%; padding: 4px; }
  #info { white-space: pre-wrap; background: #f3f4f6; padding: 8px; border-radius: 6px; min-height: 60px; }
  .legend span { display: inline-block; padding: 2px 6px; border-radius: 4px; margin: 2px; font-size: 11px; }
  a { color: #2563eb; }
  .hint { color: #6b7280; font-size: 11px; }
  #tooltip { position: absolute; background: #111827; color: #fff; padding: 6px 8px; border-radius: 5px;
             font-size: 12px; pointer-events: none; display: none; max-width: 260px; z-index: 10; }
</style>
<div id="cy"></div>
<div id="tooltip"></div>
<div id="side">
  <h1>flowgraph</h1>
  <div class="row">
    <label>Service</label>
    <select id="fService"><option value="">all</option></select>
  </div>
  <div class="row">
    <label>Task queue</label>
    <select id="fQueue"><option value="">all</option></select>
  </div>
  <div class="row hint">Click a node for blast radius (upstream + downstream). Click empty space to reset.</div>
  <div class="row">
    <label>Selected</label>
    <div id="info">nothing selected</div>
  </div>
  <div class="row legend" id="legend"></div>
</div>
<script>
const colors = {
  Workflow: "#2563eb", Activity: "#16a34a", ControlPlaneCaller: "#ca8a04",
  Signal: "#a21caf", Query: "#ea580c"
};
const lg = document.getElementById("legend");
for (const [k, v] of Object.entries(colors)) {
  const s = document.createElement("span");
  s.textContent = k; s.style.background = v + "22"; s.style.border = "1px solid " + v;
  lg.appendChild(s);
}

fetch("graph.json").then(r => r.json()).then(g => boot(g));

function boot(g) {
  const elements = [];
  for (const n of g.nodes) {
    elements.push({ data: {
      id: n.id, label: n.name, kind: n.kind, service: n.service || "",
      queues: (n.taskQueues || []).join(","), file: n.file, line: n.line,
      registered: !!n.registered, started: !!n.started, listener: !!n.hasListener
    }});
  }
  for (let i = 0; i < g.edges.length; i++) {
    const e = g.edges[i];
    elements.push({ data: {
      id: "e" + i, source: e.from, target: e.to, kind: e.kind,
      resolution: e.resolution, queue: e.taskQueue || "",
      timeout: !!e.hasTimeout, retry: !!e.hasRetry, unresolved: e.resolution !== "resolved"
    }});
  }

  const cy = cytoscape({
    container: document.getElementById("cy"),
    elements,
    style: [
      { selector: "node", style: {
        "label": "data(label)", "font-size": 10, "text-wrap": "wrap", "text-max-width": 90,
        "text-valign": "center", "color": "#111827", "width": 50, "height": 50,
        "background-color": ele => colors[ele.data("kind")] || "#888",
        "background-opacity": 0.25, "border-width": 2,
        "border-color": ele => colors[ele.data("kind")] || "#888"
      }},
      { selector: 'node[kind = "Activity"]', style: { "shape": "round-rectangle" } },
      { selector: 'node[kind = "Signal"]', style: { "shape": "diamond" } },
      { selector: 'node[kind = "Query"]', style: { "shape": "diamond" } },
      { selector: "edge", style: {
        "label": "data(queue)", "font-size": 8, "color": "#6b7280", "curve-style": "bezier",
        "target-arrow-shape": "triangle", "width": 1.5,
        "line-color": "#9ca3af", "target-arrow-color": "#9ca3af"
      }},
      { selector: "edge[?unresolved]", style: {
        "line-style": "dashed", "line-color": "#dc2626", "target-arrow-color": "#dc2626"
      }},
      { selector: ".faded", style: { "opacity": 0.12 } },
      { selector: ".hidden", style: { "display": "none" } }
    ],
    layout: { name: "breadthfirst", directed: true, spacingFactor: 1.3 }
  });

  // populate filters
  fill("fService", new Set(cy.nodes().map(n => n.data("service")).filter(Boolean)));
  const queues = new Set();
  cy.nodes().forEach(n => (n.data("queues") || "").split(",").forEach(q => q && queues.add(q)));
  fill("fQueue", queues);
  document.getElementById("fService").onchange = applyFilters;
  document.getElementById("fQueue").onchange = applyFilters;
  function applyFilters() {
    const s = document.getElementById("fService").value;
    const q = document.getElementById("fQueue").value;
    cy.nodes().forEach(n => {
      const okS = !s || n.data("service") === s;
      const okQ = !q || (n.data("queues") || "").split(",").includes(q);
      n.toggleClass("hidden", !(okS && okQ));
    });
    cy.edges().forEach(e => e.toggleClass("hidden",
      e.source().hasClass("hidden") || e.target().hasClass("hidden")));
  }

  // blast radius
  cy.on("tap", "node", evt => {
    const n = evt.target;
    const keep = n.union(n.successors()).union(n.predecessors());
    cy.elements().addClass("faded");
    keep.removeClass("faded");
    const d = n.data();
    const link = "vscode://file/" + d.file + ":" + d.line;
    document.getElementById("info").innerHTML =
      `<b>${d.label}</b> (${d.kind})\n` +
      `service: ${d.service || "-"}\n` +
      `queues: ${d.queues || "-"}\n` +
      `registered: ${d.registered}  started: ${d.started}\n` +
      `<a href="${link}">${d.file}:${d.line}</a>`;
  });
  cy.on("tap", evt => { if (evt.target === cy) { cy.elements().removeClass("faded"); }});

  // edge tooltip
  const tip = document.getElementById("tooltip");
  cy.on("mouseover", "edge", evt => {
    const d = evt.target.data();
    tip.innerHTML = `<b>${d.kind}</b><br>resolution: ${d.resolution}` +
      (d.queue ? `<br>queue: ${d.queue}` : "") +
      (d.kind === "EXECUTES_ACTIVITY" ? `<br>timeout: ${d.timeout}<br>retry: ${d.retry}` : "");
    tip.style.display = "block";
  });
  cy.on("mousemove", "edge", evt => {
    tip.style.left = (evt.renderedPosition.x + 14) + "px";
    tip.style.top = (evt.renderedPosition.y + 14) + "px";
  });
  cy.on("mouseout", "edge", () => { tip.style.display = "none"; });
}

function fill(id, set) {
  const sel = document.getElementById(id);
  [...set].sort().forEach(v => {
    const o = document.createElement("option"); o.value = v; o.textContent = v; sel.appendChild(o);
  });
}
</script>
